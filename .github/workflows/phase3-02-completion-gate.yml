name: Phase 3.02 Completion Gate

on:
  push:
    branches:
      - main
      - phase3-02-paper-operational-completion-gate
  pull_request:
    paths:
      - "hunter_completion_gate.py"
      - "tests/test_hunter_completion_gate.py"
      - ".github/workflows/phase3-02-completion-gate.yml"

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile completion gate
        run: python -m py_compile hunter_completion_gate.py tests/test_hunter_completion_gate.py

      - name: Run focused tests
        run: python -m unittest tests.test_hunter_completion_gate
